name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r scripts/requirements.txt

      - name: Validate all entries
        run: python scripts/validate-entry.py domains/

      - name: Verify JSONL export
        run: python scripts/export-to-jsonl.py

      - name: Validate JSONL against schema
        run: python scripts/validate-jsonl.py
