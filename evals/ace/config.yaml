# ACE Benchmark Configuration — v2.0
#
# This file controls a run of scripts/run-ace.py. All model IDs resolve
# through OpenRouter (openrouter.ai). Requires OPENROUTER_API_KEY in the
# environment.
#
# v2.0 locks the judge to a single model (Opus 4.6) after v1.0 measured
# a +0.50 in-group bias from Grok 4.20 in the original 4-judge council.
# See evals/ace/METHODOLOGY.md §0.1 for the full rationale.

# ---------------------------------------------------------------------------
# Test subjects — the efficiency-tier models being evaluated
# ---------------------------------------------------------------------------
# Each entry needs a stable label (used for --test-model and by_model reports)
# and an exact OpenRouter model ID.
test_subjects:
  - label: haiku-4.5
    id: anthropic/claude-haiku-4-5
  - label: gpt-5.4-mini
    id: openai/gpt-5.4-mini
  - label: gemini-3.1-flash-lite
    id: google/gemini-3.1-flash-lite-preview
  - label: grok-4.1-fast
    id: x-ai/grok-4.1-fast

# ---------------------------------------------------------------------------
# Judge — single reasoning-tier model scores every response in v2.0
# ---------------------------------------------------------------------------
judge:
  id: anthropic/claude-opus-4.6

# ---------------------------------------------------------------------------
# Retrieval — Dojo Retriever settings
# ---------------------------------------------------------------------------
retrieval:
  retriever_version: "1.0"
  max_entries: 9

# ---------------------------------------------------------------------------
# API — OpenRouter request parameters
# ---------------------------------------------------------------------------
api:
  temperature: 0.0
  max_tokens: 2048
  concurrency: 8
